<div class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-10 center">
        <div class="card">
          <div class="card-header" data-background-color="red">
            <h4 class="title">Ajouter un compte Web</h4>
            <p class="category">Remplissez ce formulaire</p>
          </div>
          <div class="card-content">
            <form [formGroup]="webForm">
              <div class="row">

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label" for="login">Login</label>
                    <input type="text" class="form-control" formControlName="login" id="login">
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label" for="password">Mot de passe</label>
                    <input type="text" class="form-control" formControlName="password" id="password">
                  </div>
                </div>
              </div>


              <div class="row">

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label" for="code_pays">Code Pays</label>
                    <select formControlName="code_pays" class="form-control" id="code_pays">
                      @for (codePays of codesPays(); track codePays.value) {
                      <option [value]="codePays.value">
                        {{codePays.key}} (+{{codePays.value}}) </option>
                      }
                    </select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <div class="input-group input-append date">
                      <input type="text" class="form-control" bsDatepicker formControlName="date_expiration"
                        [bsConfig]="{ dateInputFormat: 'DD-MM-YYYY' }" placeholder="Date d'expiration">
                    </div>

                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <div class="input-group input-append date">
                      <label class="control-label" for="idCompte">Compte serveur</label>
                      <select formControlName="idCompte" class="form-control" id="idCompte">
                        @for (server of serverAccounts(); track server.idCompteClientServer) {
                        <option [value]="server.idCompteClientServer"> {{server.pseudo}} </option>
                        }
                      </select>
                    </div>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label" for="adresseIP">IP Adresse</label>
                    <select formControlName="ipAdresse" id="adresseIP" class="form-control">
                      @for (ip of ipAddresses(); track ip.value) {
                      <option [ngValue]="ip.value">{{ip.label}}
                      </option>
                      }
                    </select>
                  </div>
                </div>
              </div>

              <div class="row">

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label" for="firstname">Nom</label>
                    <input type="text" class="form-control" formControlName="firstname" id="firstname">
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label" for="lastname">Prénom</label>
                    <input type="text" class="form-control" formControlName="lastname" id="lastname">
                  </div>
                </div>
              </div>
              <div class="row">

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label" for="email">Email</label>
                    <input type="email" class="form-control" formControlName="email" id="email">
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label" for="telephone">Téléphone</label>
                    <input type="tel" class="form-control" formControlName="telephone" id="telephone">
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label" for="area">Région</label>
                    <select formControlName="area" class="form-control" id="area">
                      @for (t of regions; track t) {
                      <option [value]="t">{{ t }}</option>
                      }
                    </select>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="form-group label-floating">
                    <label class="control-label" for="notificationSubquery">Type de notification</label>
                    <select formControlName="notificationSubquery" class="form-control" id="notificationSubquery">
                      @for (notifSub of notifSubs; track notifSub) {
                      <option [value]="notifSub">{{ notifSub }}
                      </option>
                      }
                    </select>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="form-group label-floating">
                    <label class="control-label" for="mobileNotif">Notification Mobile</label>
                    <input type="checkbox" formControlName="mobileNotif" id="mobileNotif">
                  </div>
                </div>
              </div>

              <div class="row">

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label" for="deviceFeeByDay">Redenance equipement par jour</label>
                    <input type="number" class="form-control" formControlName="deviceFeeByDay" id="deviceFeeByDay">
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label" for="accountFeeByMonth">Redenance compte par mois</label>
                    <input type="number" class="form-control" formControlName="accountFeeByMonth"
                      id="accountFeeByMonth">
                  </div>
                </div>
              </div>

              <div class="row">

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label" for="deviceFeePerMonth">Redenance equipement par mois</label>
                    <input type="number" class="form-control" formControlName="deviceFeePerMonth"
                      id="deviceFeePerMonth">
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label" for="simCardFeePerMonth">Redenance carte sim par mois</label>
                    <input type="number" class="form-control" formControlName="simCardFeePerMonth"
                      id="simCardFeePerMonth">
                  </div>
                </div>
              </div>

              <button type="button" class="btn btn-danger pull-right" [disabled]="webForm.invalid"
                (click)="addCompteWeb()">Enregistrer le compte Web</button>
              <div class="clearfix"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
