<div class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-10 center">
        <div class="card">
          <div class="card-header" data-background-color="red">
            <h4 class="title">Ajouter un compte Web</h4>
            <p class="category">Remplissez ce formulaire</p>
          </div>
          <div class="card-content">
            <form [formGroup]="webForm">
              <div class="row">

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label">Login</label>
                    <input type="text" class="form-control" formControlName="login">
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label">Mot de passe</label>
                    <input type="text" class="form-control" formControlName="password">
                  </div>
                </div>
              </div>


              <div class="row">

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label">Code Pays</label>
                    <select formControlName="code_pays" class="form-control">
                      @for (codePays of codesPays; track codePays.value) {
                      <option [value]="codePays.value">
                        {{codePays.key}} (+{{codePays.value}}) </option>
                      }
                    </select>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <div class="input-group input-append date">
                      <input type="text" class="form-control" bsDatepicker formControlName="date_expiration"
                        [bsConfig]="{ dateInputFormat: 'DD-MM-YYYY' }" placeholder="Date d'expiration">
                    </div>

                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <div class="input-group input-append date">
                      <label class="control-label">Compte serveur</label>
                      <select formControlName="idCompte" class="form-control">
                        @for (server of serverAccounts; track server.idCompteClientServer) {
                        <option [value]="server.idCompteClientServer"> {{server.pseudo}} </option>
                        }
                      </select>
                    </div>
                  </div>
                </div>
                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label">IP Adresse</label>
                    <select formControlName="ipAdresse" id="adresseIP" class="form-control">
                      @for (ip of ipAddresses; track ip.value) {
                      <option [ngValue]="ip.value">{{ip.label}}
                      </option>
                      }
                    </select>
                  </div>
                </div>
              </div>

              <div class="row">

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label">Nom</label>
                    <input type="text" class="form-control" formControlName="firstname">
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label">Prénom</label>
                    <input type="text" class="form-control" formControlName="lastname">
                  </div>
                </div>
              </div>
              <div class="row">

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label">Email</label>
                    <input type="email" class="form-control" formControlName="email">
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label">Téléphone</label>
                    <input type="tel" class="form-control" formControlName="telephone">
                  </div>
                </div>
              </div>
              <div class="row">
                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label">Région</label>
                    <select formControlName="area" class="form-control">
                      @for (t of regions; track t) {
                      <option [value]="t">{{ t }}</option>
                      }
                    </select>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="form-group label-floating">
                    <label class="control-label">Type de notification</label>
                    <select formControlName="notificationSubquery" class="form-control">
                      @for (notifSub of notifSubs; track notifSub) {
                      <option [value]="notifSub">{{ notifSub }}
                      </option>
                      }
                    </select>
                  </div>
                </div>
                <div class="col-md-3">
                  <div class="form-group label-floating">
                    <label class="control-label">Notification Mobile</label>
                    <input type="checkbox" formControlName="mobileNotif">
                  </div>
                </div>
              </div>

              <div class="row">

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label">Redenance equipement par jour</label>
                    <input type="number" class="form-control" formControlName="deviceFeeByDay">
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label">Redenance compte par mois</label>
                    <input type="number" class="form-control" formControlName="accountFeeByMonth">
                  </div>
                </div>
              </div>

              <div class="row">

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label">Redenance equipement par mois</label>
                    <input type="number" class="form-control" formControlName="deviceFeePerMonth">
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="form-group label-floating">
                    <label class="control-label">Redenance carte sim par mois</label>
                    <input type="number" class="form-control" formControlName="simCardFeePerMonth">
                  </div>
                </div>
              </div>

              <button type="button" class="btn btn-danger pull-right" [disabled]="webForm.invalid"
                (click)="addCompteWeb()">Enregistrer le compte Web</button>
              <div class="clearfix"></div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
