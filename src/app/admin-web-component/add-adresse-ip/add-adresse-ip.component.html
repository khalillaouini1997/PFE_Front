<div class="container-fluid">

  <div class="row">
    <div class="col-md-6 center">
      <div class="card">
        <div class="card-header" data-background-color="blue">
          <h4 class="title">Add New Ip Address</h4>
          <p class="category">Complete this Form</p>
        </div>
        <div class="card-content">
          <form [formGroup]="ipForm">
            <div class="row">

              <div class="col-md-6">
                <div class="form-group label-floating">
                  <label class="control-label">Label</label>
                  <input type="text" formControlName="label" class="form-control">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group label-floating">
                  <label class="control-label">Value</label>
                  <input type="text" formControlName="value" class="form-control">
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">
                <div class="form-group label-floating">
                  <label class="control-label">Pseudo</label>
                  <input type="text" formControlName="jdbcUser" class="form-control">
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group label-floating">
                  <label class="control-label">Password</label>
                  <input type="password" formControlName="jdbcPass" class="form-control">
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-9">
                <div class="form-group label-floating">
                  <label class="control-label">URL</label>
                  <input type="text" formControlName="url" class="form-control">
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-4">
                <div class="form-group label-floating">
                  <label class="control-label">Type de Connection</label>
                  <select formControlName="typeConnection" class="form-control">
                    @for (type of typeConnection; track type.type) {
                    <option [value]="type.type"> {{type.type}} </option>
                    }
                  </select>
                </div>
              </div>
              <div class="col-md-4">
                <div class="form-group label-floating">
                  <label class="control-label">Data Base Name</label>
                  <input type="text" formControlName="dbName" class="form-control">
                </div>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6">

              </div>
              <button type="button" class="btn btn-info pull-right" [disabled]="ipForm.invalid"
                (click)="saveIpAddres()">Save Ip Address</button>

            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
